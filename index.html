<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Payout Calculator</title>
<style>
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background-color: #f4f7f6; 
    margin: 0; 
    padding: 16px; 
    color: #333; 
  }
  .card { 
    background: #fff; 
    border-radius: 12px; 
    padding: 20px; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    max-width: 600px; 
    margin: 0 auto; 
  }
  h1 { 
    text-align: center; 
    color: #2c3e50; 
    font-size: 22px; 
    margin-top: 0;
  }
  .header-actions {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 10px;
  }
  .header-settings { 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 15px; 
    align-items: center; 
    background: #ecf0f1;
    padding: 12px;
    border-radius: 8px;
  }
  .header-settings label { font-weight: bold; font-size: 14px; }
  .header-settings input { 
    width: 60px; 
    padding: 6px; 
    text-align: right; 
    font-size: 16px; 
    border: 1px solid #bdc3c7;
    border-radius: 4px;
  }
  .date-picker {
    width: 140px !important;
    text-align: center !important;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    background: #e8f6f3;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .stat-box {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding-bottom: 4px;
  }
  .stat-box:last-child, .stat-box:nth-last-child(2) {
    border-bottom: none;
    padding-bottom: 0;
  }
  .stat-box span { color: #555; }
  .stat-box strong { color: #2c3e50; }
  .highlight-chip { color: #e67e22 !important; }
  
  .player-row { 
    border-bottom: 1px solid #eee; 
    padding: 16px 0; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }
  .player-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
  }
  .player-info-stack {
    display: flex;
    flex-direction: column;
    width: 65%;
    gap: 6px;
  }
  .player-name-input {
    border: none; 
    font-size: 18px; 
    font-weight: bold; 
    background: transparent;
    color: #2c3e50;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 2px;
  }
  .player-email-input {
    border: none; 
    font-size: 13px; 
    background: transparent;
    color: #7f8c8d;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 2px;
  }
  .player-inputs { 
    display: flex; 
    gap: 12px; 
  }
  .input-group { 
    display: flex; 
    flex-direction: column; 
    flex: 1; 
  }
  .input-group label { 
    font-size: 12px; 
    color: #7f8c8d; 
    margin-bottom: 4px;
  }
  .input-group input { 
    padding: 10px; 
    border: 1px solid #bdc3c7; 
    border-radius: 6px; 
    font-size: 16px; 
  }
  .player-results { 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    font-size: 14px; 
    background: #f8f9fa; 
    padding: 12px; 
    border-radius: 6px; 
  }
  .result-data {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-positive { color: #27ae60; font-weight: bold; }
  .result-negative { color: #c0392b; font-weight: bold; }
  
  .btn { 
    background: #3498db; 
    color: white; 
    border: none; 
    padding: 14px 16px; 
    border-radius: 8px; 
    font-size: 16px; 
    font-weight: bold;
    cursor: pointer; 
    width: 100%; 
    margin-top: 15px; 
  }
  .btn:active { background: #2980b9; }
  .btn-remove { 
    background: #e74c3c; 
    padding: 6px 12px; 
    font-size: 13px; 
    width: auto; 
    margin: 0; 
    border-radius: 4px;
  }
  .btn-reset {
    background: #f39c12;
    margin-top: 0;
    font-size: 14px;
    padding: 12px;
  }
  .btn-reset:active { background: #d68910; }
  .btn-email {
    background: #27ae60;
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    display: inline-block;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Live Poker Tracker</h1>
  
  <div class="header-actions">
    <button class="btn btn-reset" onclick="resetGame()">🔄 Reset Game</button>
  </div>
  
  <div class="header-settings">
    <label for="gameDate">Date:</label>
    <input type="date" id="gameDate" class="date-picker" onchange="calculate()">
  </div>
  
  <div class="header-settings">
    <label for="unitPrice">Buy-in Unit ($):</label>
    <input type="number" id="unitPrice" value="24" oninput="calculate()">
  </div>

  <div class="summary-grid">
    <div class="stat-box"><span>Players:</span> <strong id="playerCount">0</strong></div>
    <div class="stat-box"><span>Total Units:</span> <strong id="totalUnits">0</strong></div>
    <div class="stat-box"><span>Total Pot:</span> <strong id="totalPot">$0.00</strong></div>
    <div class="stat-box"><span>Fixed Chip Value:</span> <strong id="chipValue">$0.04</strong></div>
    <div class="stat-box"><span>Expected Chips:</span> <strong id="expectedChips" class="highlight-chip">0</strong></div>
    <div class="stat-box"><span>Counted Chips:</span> <strong id="totalChips">0</strong></div>
  </div>

  <div id="playersList"></div>

  <button class="btn" onclick="addPlayer()">+ Add Player</button>
</div>

<script>
  // Safe Date Initialization
  try {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('gameDate').value = today;
  } catch (e) {
    console.log("Date init skipped.");
  }

  const CHIPS_PER_UNIT = 600;
  
  // Default roster if local storage is empty
  let players = [
    { id: 1, name: 'Rajesh', email: 'rajesh.suddapalli@gmail.com', buyInUnits: 0, endingChips: 0 },
    { id: 2, name: 'Ram', email: 'dearramgopal@gmail.com', buyInUnits: 0, endingChips: 0 },
    { id: 3, name: 'Sree', email: 'sxc690@case.edu', buyInUnits: 0, endingChips: 0 }
  ];
  let nextId = 4;

  // --- Local Storage Functions ---
  function loadData() {
    const savedData = localStorage.getItem('pokerAppState');
    if (savedData) {
      const parsedData = JSON.parse(savedData);
      players = parsedData.players || [];
      nextId = parsedData.nextId || 4;
    }
  }

  function saveData() {
    const dataToSave = {
      players: players,
      nextId: nextId
    };
    localStorage.setItem('pokerAppState', JSON.stringify(dataToSave));
  }
  // -------------------------------

  function addPlayer() {
    players.push({ id: nextId++, name: '', email: '', buyInUnits: 0, endingChips: 0 });
    renderPlayers();
  }

  function removePlayer(id) {
    players = players.filter(p => p.id !== id);
    renderPlayers();
  }

  function updatePlayer(id, field, value) {
    const player = players.find(p => p.id === id);
    if (player) {
      if (field === 'name' || field === 'email') {
        player[field] = value;
      } else {
        player[field] = parseFloat(value) || 0;
      }
      calculate();
    }
  }

  function resetGame() {
    if(confirm("Start a new game? This will reset all buy-ins and chips to zero, but keep your players.")) {
      players.forEach(p => {
        p.buyInUnits = 0;
        p.endingChips = 0;
      });
      renderPlayers();
    }
  }

  function renderPlayers() {
    const list = document.getElementById('playersList');
    list.innerHTML = '';
    
    players.forEach(p => {
      const div = document.createElement('div');
      div.className = 'player-row';
      div.innerHTML = `
        <div class="player-header">
          <div class="player-info-stack">
            <input type="text" class="player-name-input" value="${p.name}" placeholder="Player Name" oninput="updatePlayer(${p.id}, 'name', this.value)">
            <input type="email" class="player-email-input" value="${p.email || ''}" placeholder="Email Address" oninput="updatePlayer(${p.id}, 'email', this.value)">
          </div>
          <button class="btn btn-remove" onclick="removePlayer(${p.id})">Remove</button>
        </div>
        <div class="player-inputs">
          <div class="input-group">
            <label>Buy-in Units</label>
            <input type="number" inputmode="numeric" value="${p.buyInUnits}" min="0" oninput="updatePlayer(${p.id}, 'buyInUnits', this.value)">
          </div>
          <div class="input-group">
            <label>Ending Chips</label>
            <input type="number" inputmode="numeric" value="${p.endingChips}" min="0" oninput="updatePlayer(${p.id}, 'endingChips', this.value)">
          </div>
        </div>
        <div class="player-results">
          <div class="result-data">
            <span>Payout: <strong id="payout-${p.id}">$0.00</strong></span>
            <span>P/L: <strong id="pl-${p.id}">$0.00</strong></span>
          </div>
          <a href="#" id="email-btn-${p.id}" class="btn-email">✉️ Email</a>
        </div>
      `;
      list.appendChild(div);
    });
    
    calculate();
  }

  function calculate() {
    const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
    const gameDate = document.getElementById('gameDate').value || 'Unknown Date';
    
    let totalPot = 0;
    let totalChipsCounted = 0;
    let totalUnits = 0;
    
    players.forEach(p => {
      totalUnits += p.buyInUnits;
      totalPot += p.buyInUnits * unitPrice;
      totalChipsCounted += p.endingChips;
    });

    const expectedChips = totalUnits * CHIPS_PER_UNIT;
    const fixedChipValue = unitPrice / CHIPS_PER_UNIT;

    document.getElementById('playerCount').innerText = players.length;
    document.getElementById('totalUnits').innerText = totalUnits;
    document.getElementById('totalPot').innerText = '$' + totalPot.toFixed(2);
    document.getElementById('expectedChips').innerText = expectedChips.toLocaleString();
    document.getElementById('totalChips').innerText = totalChipsCounted.toLocaleString();
    document.getElementById('chipValue').innerText = '$' + fixedChipValue.toFixed(4);

    players.forEach(p => {
      const totalIn = p.buyInUnits * unitPrice;
      const payout = p.endingChips * fixedChipValue;
      const pl = payout - totalIn;

      document.getElementById('payout-' + p.id).innerText = '$' + payout.toFixed(2);
      
      const plEl = document.getElementById('pl-' + p.id);
      const plFormatted = (pl >= 0 ? '+$' : '-$') + Math.abs(pl).toFixed(2);
      plEl.innerText = plFormatted;
      plEl.className = pl >= 0 ? 'result-positive' : 'result-negative';

      // Safe Mailto Generator
      try {
        const subject = encodeURIComponent(`Poker Game Summary - ${gameDate}`);
        const body = encodeURIComponent(
`Hi ${p.name},

Here is your summary for the poker game on ${gameDate}:

• Buy-in Units: ${p.buyInUnits}
• Total Cash In: $${totalIn.toFixed(2)}
• Ending Chips Count: ${p.endingChips}

------------------------
• Final Payout: $${payout.toFixed(2)}
• Net Profit/Loss: ${plFormatted}
------------------------

Thanks for playing!`
        );
        const mailtoLink = `mailto:${p.email || ''}?subject=${subject}&body=${body}`;
        document.getElementById('email-btn-' + p.id).href = mailtoLink;
      } catch(e) {
        document.getElementById('email-btn-' + p.id).href = '#';
      }
    });

    // Save state automatically every time a calculation occurs
    saveData();
  }

  // Start the application: Load data first, then render
  loadData();
  renderPlayers();

</script>
</body>
</html>
