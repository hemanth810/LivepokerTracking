<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Payout Calculator</title>
<style>
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background-color: #f4f7f6; 
    margin: 0; 
    padding: 16px; 
    color: #333; 
  }
  .card { 
    background: #fff; 
    border-radius: 12px; 
    padding: 20px; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    max-width: 600px; 
    margin: 0 auto; 
  }
  h1 { 
    text-align: center; 
    color: #2c3e50; 
    font-size: 22px; 
    margin-top: 0;
  }
  .header-settings { 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 15px; 
    align-items: center; 
    background: #ecf0f1;
    padding: 12px;
    border-radius: 8px;
  }
  .header-settings label { font-weight: bold; font-size: 14px; }
  .header-settings input { 
    width: 60px; 
    padding: 6px; 
    text-align: right; 
    font-size: 16px; 
    border: 1px solid #bdc3c7;
    border-radius: 4px;
  }
  .date-picker {
    width: 130px !important;
    text-align: center !important;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    background: #e8f6f3;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .stat-box {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding-bottom: 4px;
  }
  .stat-box:last-child, .stat-box:nth-last-child(2) {
    border-bottom: none;
    padding-bottom: 0;
  }
  .stat-box span { color: #555; }
  .stat-box strong { color: #2c3e50; }
  .highlight-chip { color: #e67e22 !important; }
  .player-row { 
    border-bottom: 1px solid #eee; 
    padding: 16px 0; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }
  .player-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
  }
  .player-name-input {
    border: none; 
    font-size: 18px; 
    font-weight: bold; 
    width: 60%; 
    background: transparent;
    color: #2c3e50;
    border-bottom: 1px dashed #ccc;
  }
  .player-inputs { 
    display: flex; 
    gap: 12px; 
  }
  .input-group { 
    display: flex; 
    flex-direction: column; 
    flex: 1; 
  }
  .input-group label { 
    font-size: 12px; 
    color: #7f8c8d; 
    margin-bottom: 4px;
  }
  .input-group input { 
    padding: 10px; 
    border: 1px solid #bdc3c7; 
    border-radius: 6px; 
    font-size: 16px; 
  }
  .player-results { 
    display: flex; 
    justify-content: space-between; 
    font-size: 15px; 
    background: #f8f9fa; 
    padding: 12px; 
    border-radius: 6px; 
  }
  .result-positive { color: #27ae60; font-weight: bold; }
  .result-negative { color: #c0392b; font-weight: bold; }
  .btn { 
    background: #3498db; 
    color: white; 
    border: none; 
    padding: 14px 16px; 
    border-radius: 8px; 
    font-size: 16px; 
    font-weight: bold;
    cursor: pointer; 
    width: 100%; 
    margin-top: 15px; 
  }
  .btn:active { background: #2980b9; }
  .btn-remove { 
    background: #e74c3c; 
    padding: 6px 12px; 
    font-size: 13px; 
    width: auto; 
    margin: 0; 
    border-radius: 4px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Live Poker Tracker</h1>
  
  <div class="header-settings">
    <label for="gameDate">Date:</label>
    <input type="date" id="gameDate" class="date-picker">
  </div>
  
  <div class="header-settings">
    <label for="unitPrice">Buy-in Unit ($):</label>
    <input type="number" id="unitPrice" value="24">
  </div>

  <div class="summary-grid">
    <div class="stat-box"><span>Players:</span> <strong id="playerCount">0</strong></div>
    <div class="stat-box"><span>Total Units:</span> <strong id="totalUnits">0</strong></div>
    <div class="stat-box"><span>Total Pot:</span> <strong id="totalPot">$0.00</strong></div>
    <div class="stat-box"><span>Chip Value:</span> <strong id="chipValue">$0.00</strong></div>
    <div class="stat-box"><span>Expected Chips:</span> <strong id="expectedChips" class="highlight-chip">0</strong></div>
    <div class="stat-box"><span>Counted Chips:</span> <strong id="totalChips">0</strong></div>
  </div>

  <div id="playersList"></div>

  <button id="addPlayerBtn" class="btn">+ Add Player</button>
</div>

<script>
  const CHIPS_PER_UNIT = 600;
  
  let players = [
    { id: 1, name: 'Rajesh', buyInUnits: 3, endingChips: 2735 },
    { id: 2, name: 'Ram', buyInUnits: 2, endingChips: 1837 },
    { id: 3, name: 'Sree', buyInUnits: 5, endingChips: 0 }
  ];
  let nextId = 4;

  // Set today's date on load
  document.getElementById('gameDate').valueAsDate = new Date();

  function renderPlayers() {
    const list = document.getElementById('playersList');
    list.innerHTML = '';
    
    players.forEach(p => {
      const div = document.createElement('div');
      div.className = 'player-row';
      div.innerHTML = `
        <div class="player-header">
          <input type="text" class="player-name-input" data-id="${p.id}" data-field="name" value="${p.name}">
          <button class="btn btn-remove" data-id="${p.id}">Remove</button>
        </div>
        <div class="player-inputs">
          <div class="input-group">
            <label>Buy-in Units</label>
            <input type="number" inputmode="numeric" data-id="${p.id}" data-field="buyInUnits" value="${p.buyInUnits}" min="0">
          </div>
          <div class="input-group">
            <label>Ending Chips</label>
            <input type="number" inputmode="numeric" data-id="${p.id}" data-field="endingChips" value="${p.endingChips}" min="0">
          </div>
        </div>
        <div class="player-results">
          <span>Payout: <strong id="payout-${p.id}">$0.00</strong></span>
          <span>P/L: <strong id="pl-${p.id}">$0.00</strong></span>
        </div>
      `;
      list.appendChild(div);
    });
    calculate();
  }

  function calculate() {
    const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
    
    let totalPot = 0;
    let totalChipsCounted = 0;
    let totalUnits = 0;
    
    players.forEach(p => {
      totalUnits += p.buyInUnits;
      totalPot += p.buyInUnits * unitPrice;
      totalChipsCounted += p.endingChips;
    });

    const expectedChips = totalUnits * CHIPS_PER_UNIT;
    
    // To ensure exact payouts even if a few chips are lost under the table, 
    // the payout logic divides the total cash pot by the actual chips counted.
    const chipValue = totalChipsCounted > 0 ? totalPot / totalChipsCounted : 0;

    // Update Top Summary Board
    document.getElementById('playerCount').innerText = players.length;
    document.getElementById('totalUnits').innerText = totalUnits;
    document.getElementById('totalPot').innerText = '$' + totalPot.toFixed(2);
    document.getElementById('expectedChips').innerText = expectedChips.toLocaleString();
    document.getElementById('totalChips').innerText = totalChipsCounted.toLocaleString();
    document.getElementById('chipValue').innerText = '$' + chipValue.toFixed(4);

    // Update Individual Player Payouts
    players.forEach(p => {
      const totalIn = p.buyInUnits * unitPrice;
      const payout = p.endingChips * chipValue;
      const pl = payout - totalIn;

      document.getElementById('payout-' + p.id).innerText = '$' + payout.toFixed(2);
      
      const plEl = document.getElementById('pl-' + p.id);
      plEl.innerText = (pl >= 0 ? '+$' : '-$') + Math.abs(pl).toFixed(2);
      plEl.className = pl >= 0 ? 'result-positive' : 'result-negative';
    });
  }

  // --- Modern Event Delegation for Mobile Support ---
  
  document.getElementById('playersList').addEventListener('input', (e) => {
    if (e.target.tagName === 'INPUT') {
      const id = parseInt(e.target.getAttribute('data-id'));
      const field = e.target.getAttribute('data-field');
      const player = players.find(p => p.id === id);
      
      if (player) {
        player[field] = field === 'name' ? e.target.value : parseFloat(e.target.value) || 0;
        calculate();
      }
    }
  });

  document.getElementById('playersList').addEventListener('click', (e) => {
    if (e.target.classList.contains('btn-remove')) {
      const id = parseInt(e.target.getAttribute('data-id'));
      players = players.filter(p => p.id !== id);
      renderPlayers();
    }
  });

  document.getElementById('addPlayerBtn').addEventListener('click', () => {
    players.push({ id: nextId++, name: 'New Player', buyInUnits: 1, endingChips: 0 });
    renderPlayers();
  });

  document.getElementById('unitPrice').addEventListener('input', calculate);

  // Initialize App
  renderPlayers();
</script>
</body>
</html>
