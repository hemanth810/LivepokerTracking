<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Payout Calculator</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker">
<style>
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background-color: #f4f7f6; 
    margin: 0; 
    padding: 16px; 
    color: #333; 
  }
  .card { 
    background: #fff; 
    border-radius: 12px; 
    padding: 20px; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    max-width: 600px; 
    margin: 0 auto; 
  }
  h1 { 
    text-align: center; 
    color: #2c3e50; 
    font-size: 22px; 
    margin-top: 0;
  }
  
  /* Top Action Buttons Grid */
  .header-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  
  .header-settings { 
    display: flex; 
    justify-content: space-between; 
    margin-bottom: 12px; 
    align-items: center; 
    background: #ecf0f1;
    padding: 12px;
    border-radius: 8px;
  }
  .header-settings label { font-weight: bold; font-size: 14px; color: #2c3e50; }
  .header-settings input { 
    width: 70px; 
    padding: 6px; 
    text-align: right; 
    font-size: 16px; 
    border: 1px solid #bdc3c7;
    border-radius: 4px;
  }
  .date-picker {
    width: 140px !important;
    text-align: center !important;
  }
  .email-picker {
    width: 160px !important;
    text-align: left !important;
    font-size: 14px !important;
  }
  
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    background: #e8f6f3;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    margin-top: 5px;
  }
  .stat-box {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding-bottom: 4px;
  }
  .stat-box:last-child, .stat-box:nth-last-child(2) {
    border-bottom: none;
    padding-bottom: 0;
  }
  .stat-box span { color: #555; }
  .stat-box strong { color: #2c3e50; }
  .highlight-chip { color: #e67e22 !important; }
  
  .player-row { 
    border-bottom: 1px solid #eee; 
    padding: 16px 0; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
  }
  .player-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
  }
  .player-info-stack {
    display: flex;
    flex-direction: column;
    width: 65%;
    gap: 6px;
  }
  .player-name-input {
    border: none; 
    font-size: 18px; 
    font-weight: bold; 
    background: transparent;
    color: #2c3e50;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 2px;
  }
  .player-email-input {
    border: none; 
    font-size: 13px; 
    background: transparent;
    color: #7f8c8d;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 2px;
  }
  .player-inputs { 
    display: flex; 
    gap: 12px; 
  }
  .input-group { 
    display: flex; 
    flex-direction: column; 
    flex: 1; 
  }
  .input-group label { 
    font-size: 12px; 
    color: #7f8c8d; 
    margin-bottom: 4px;
  }
  .input-group input { 
    padding: 10px; 
    border: 1px solid #bdc3c7; 
    border-radius: 6px; 
    font-size: 16px; 
  }
  .player-results { 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    font-size: 14px; 
    background: #f8f9fa; 
    padding: 12px; 
    border-radius: 6px; 
  }
  .result-data {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-positive { color: #27ae60; font-weight: bold; }
  .result-negative { color: #c0392b; font-weight: bold; }
  
  .btn { 
    color: white; 
    border: none; 
    border-radius: 8px; 
    font-size: 13px; 
    font-weight: bold;
    cursor: pointer; 
    padding: 12px;
    text-align: center;
  }
  .btn-add { background: #3498db; width: 100%; font-size: 16px; padding: 14px 16px; margin-top: 15px; }
  .btn-add:active { background: #2980b9; }
  
  .btn-remove { 
    background: #e74c3c; 
    padding: 6px 12px; 
    font-size: 13px; 
    width: auto; 
    margin: 0; 
    border-radius: 4px;
  }
  
  .btn-reset { background: #e74c3c; }
  .btn-reset:active { background: #c0392b; }
  
  .btn-save { background: #27ae60; }
  .btn-save:active { background: #1e8449; }
  
  .btn-admin { background: #8e44ad; }
  .btn-admin:active { background: #732d91; }
  
  .btn-group { background: #2980b9; }
  .btn-group:active { background: #1f618d; }
  
  .btn-email {
    background: #2ecc71;
    color: white;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    display: inline-block;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Live Poker Tracker</h1>
  
  <div class="header-actions">
    <button class="btn btn-reset" onclick="resetPlayers()">🔄 Reset Players</button>
    <button class="btn btn-save" onclick="manualSave()">💾 Save Game Data</button>
    <button class="btn btn-admin" onclick="sendAdminSummary()">📊 My Summary</button>
    <button class="btn btn-group" onclick="sendGroupSummary()">👥 Group Summary</button>
  </div>

  <div class="header-settings">
    <label for="masterEmail">Master Email:</label>
    <input type="email" id="masterEmail" class="email-picker" placeholder="leader@email.com" onchange="manualSave()">
  </div>
  
  <div class="header-settings">
    <label for="gameDate">Date:</label>
    <input type="date" id="gameDate" class="date-picker" onchange="calculate()">
  </div>
  
  <div class="header-settings">
    <label for="unitPrice">Buy-in Unit ($):</label>
    <input type="number" id="unitPrice" value="24" oninput="calculate()">
  </div>

  <div class="header-settings">
    <label for="chipsPerUnit">Chips per Unit:</label>
    <input type="number" id="chipsPerUnit" value="600" oninput="calculate()">
  </div>

  <div class="summary-grid">
    <div class="stat-box"><span>Players:</span> <strong id="playerCount">0</strong></div>
    <div class="stat-box"><span>Total Units:</span> <strong id="totalUnits">0</strong></div>
    <div class="stat-box"><span>Total Pot:</span> <strong id="totalPot">$0.00</strong></div>
    <div class="stat-box"><span>Chip Value:</span> <strong id="chipValue">$0.00</strong></div>
    <div class="stat-box"><span>Expected Chips:</span> <strong id="expectedChips" class="highlight-chip">0</strong></div>
    <div class="stat-box"><span>Counted Chips:</span> <strong id="totalChips">0</strong></div>
  </div>

  <div id="playersList"></div>

  <button class="btn btn-add" onclick="addPlayer()">+ Add Player</button>
</div>

<script>
  // Safe Date Initialization
  try {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('gameDate').value = today;
  } catch (e) {
    console.log("Date init skipped.");
  }

  let players = [
    { id: 1, name: 'Player 1', email: '', buyInUnits: 0, endingChips: 0 },
    { id: 2, name: 'Player 2', email: '', buyInUnits: 0, endingChips: 0 }
  ];
  let nextId = 3;

  // --- Local Storage Functions ---
  function loadData() {
    const savedData = localStorage.getItem('pokerAppState');
    if (savedData) {
      const parsedData = JSON.parse(savedData);
      players = parsedData.players || [];
      nextId = parsedData.nextId || 3;
      
      // Load saved user preferences if they exist
      if(parsedData.unitPrice) {
        document.getElementById('unitPrice').value = parsedData.unitPrice;
      }
      if(parsedData.chipsPerUnit) {
        document.getElementById('chipsPerUnit').value = parsedData.chipsPerUnit;
      }
      if(parsedData.masterEmail) {
        document.getElementById('masterEmail').value = parsedData.masterEmail;
      }
    }
  }

  function saveData() {
    const dataToSave = { 
      players: players, 
      nextId: nextId,
      unitPrice: document.getElementById('unitPrice').value,
      chipsPerUnit: document.getElementById('chipsPerUnit').value,
      masterEmail: document.getElementById('masterEmail').value
    };
    localStorage.setItem('pokerAppState', JSON.stringify(dataToSave));
  }

  function manualSave() {
    saveData();
    alert("✅ Game data and settings saved successfully!");
  }
  // -------------------------------

  function addPlayer() {
    players.push({ id: nextId++, name: '', email: '', buyInUnits: 0, endingChips: 0 });
    saveData(); 
    renderPlayers();
  }

  function removePlayer(id) {
    players = players.filter(p => p.id !== id);
    saveData(); 
    renderPlayers();
  }

  function updatePlayer(id, field, value) {
    const player = players.find(p => p.id === id);
    if (player) {
      if (field === 'name' || field === 'email') {
        player[field] = value;
      } else {
        player[field] = parseFloat(value) || 0;
      }
      calculate();
    }
  }

  // REWRITTEN FEATURE: Completely Wipe Players to Default State
  function resetPlayers() {
    if(confirm("Are you sure? This will completely wipe all players, emails, and chip counts to start fresh.")) {
      players = [
        { id: 1, name: 'Player 1', email: '', buyInUnits: 0, endingChips: 0 },
        { id: 2, name: 'Player 2', email: '', buyInUnits: 0, endingChips: 0 }
      ];
      nextId = 3;
      saveData();
      renderPlayers();
    }
  }

  // Generate Ranked Data (Helper Function)
  function getRankedPlayers() {
    const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
    const chipsPerUnit = parseInt(document.getElementById('chipsPerUnit').value) || 1; 
    const fixedChipValue = unitPrice / chipsPerUnit;

    let ranked = players.map(p => {
      const totalIn = p.buyInUnits * unitPrice;
      const payout = p.endingChips * fixedChipValue;
      const pl = payout - totalIn;
      return {
        name: p.name || 'Unnamed Player',
        email: p.email || '',
        buyInUnits: p.buyInUnits,
        totalIn: totalIn,
        endingChips: p.endingChips,
        payout: payout,
        pl: pl
      };
    });

    ranked.sort((a, b) => b.pl - a.pl);
    return ranked;
  }

  // Email to Admin Only
  function sendAdminSummary() {
    const gameDate = document.getElementById('gameDate').value || 'Unknown Date';
    const masterEmail = document.getElementById('masterEmail').value || '';
    const rankedPlayers = getRankedPlayers();

    if (!masterEmail) {
      alert("Please enter a Master Email at the top of the settings to send the summary.");
      return;
    }

    let bodyText = `MASTER POKER SUMMARY - ${gameDate}\n`;
    bodyText += `-----------------------------------\n\n`;
    bodyText += `RANKINGS (By Profit/Loss):\n\n`;

    rankedPlayers.forEach((p, index) => {
      const sign = p.pl >= 0 ? '+' : '-';
      bodyText += `${index + 1}. ${p.name.toUpperCase()}\n`;
      bodyText += `   Net: ${sign}$${Math.abs(p.pl).toFixed(2)}\n`;
      bodyText += `   (Buy-in: $${p.totalIn.toFixed(2)} | Payout: $${p.payout.toFixed(2)})\n`;
      bodyText += `-----------------------------------\n`;
    });

    try {
      const subject = encodeURIComponent(`Admin Summary - ${gameDate}`);
      const body = encodeURIComponent(bodyText);
      window.location.href = `mailto:${masterEmail}?subject=${subject}&body=${body}`;
    } catch(e) {
      alert("Unable to open the email app on this device.");
    }
  }

  // Email to the Entire Group
  function sendGroupSummary() {
    const gameDate = document.getElementById('gameDate').value || 'Unknown Date';
    const masterEmail = document.getElementById('masterEmail').value || '';
    const rankedPlayers = getRankedPlayers();

    const allEmails = rankedPlayers
      .map(p => p.email.trim())
      .filter(email => email !== '')
      .join(',');

    if (!masterEmail) {
      alert("Please enter a Master Email first. The group summary will be sent 'To' the Master Email and 'BCC' the players.");
      return;
    }

    if (!allEmails) {
      alert("No email addresses found for the players. Please add emails to the players first.");
      return;
    }

    let bodyText = `POKER GAME RESULTS - ${gameDate}\n`;
    bodyText += `-----------------------------------\n\n`;
    bodyText += `Here is the final breakdown and rankings for our recent game:\n\n`;

    rankedPlayers.forEach((p, index) => {
      const sign = p.pl >= 0 ? '+' : '-';
      bodyText += `${index + 1}. ${p.name.toUpperCase()}\n`;
      bodyText += `   Net: ${sign}$${Math.abs(p.pl).toFixed(2)}\n`;
      bodyText += `   (Buy-in: $${p.totalIn.toFixed(2)} | Payout: $${p.payout.toFixed(2)})\n`;
      bodyText += `-----------------------------------\n`;
    });

    bodyText += `\nGreat game everyone!`;

    try {
      const subject = encodeURIComponent(`Poker Results & Rankings - ${gameDate}`);
      const body = encodeURIComponent(bodyText);
      
      // Addresses the email to the Master Email, but blind-copies (bcc) the rest of the group
      window.location.href = `mailto:${masterEmail}?bcc=${allEmails}&subject=${subject}&body=${body}`;
    } catch(e) {
      alert("Unable to open the email app on this device.");
    }
  }

  function renderPlayers() {
    const list = document.getElementById('playersList');
    list.innerHTML = '';
    
    players.forEach(p => {
      const div = document.createElement('div');
      div.className = 'player-row';
      div.innerHTML = `
        <div class="player-header">
          <div class="player-info-stack">
            <input type="text" class="player-name-input" value="${p.name}" placeholder="Player Name" oninput="updatePlayer(${p.id}, 'name', this.value)">
            <input type="email" class="player-email-input" value="${p.email || ''}" placeholder="Email Address" oninput="updatePlayer(${p.id}, 'email', this.value)">
          </div>
          <button class="btn btn-remove" onclick="removePlayer(${p.id})">Remove</button>
        </div>
        <div class="player-inputs">
          <div class="input-group">
            <label>Buy-in Units</label>
            <input type="number" inputmode="numeric" value="${p.buyInUnits}" min="0" oninput="updatePlayer(${p.id}, 'buyInUnits', this.value)">
          </div>
          <div class="input-group">
            <label>Ending Chips</label>
            <input type="number" inputmode="numeric" value="${p.endingChips}" min="0" oninput="updatePlayer(${p.id}, 'endingChips', this.value)">
          </div>
        </div>
        <div class="player-results">
          <div class="result-data">
            <span>Payout: <strong id="payout-${p.id}">$0.00</strong></span>
            <span>P/L: <strong id="pl-${p.id}">$0.00</strong></span>
          </div>
          <a href="#" id="email-btn-${p.id}" class="btn-email">✉️ Personal Email</a>
        </div>
      `;
      list.appendChild(div);
    });
    
    calculate();
  }

  function calculate() {
    const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
    const chipsPerUnit = parseInt(document.getElementById('chipsPerUnit').value) || 1; 
    const gameDate = document.getElementById('gameDate').value || 'Unknown Date';
    
    let totalPot = 0;
    let totalChipsCounted = 0;
    let totalUnits = 0;
    
    players.forEach(p => {
      totalUnits += p.buyInUnits;
      totalPot += p.buyInUnits * unitPrice;
      totalChipsCounted += p.endingChips;
    });

    const expectedChips = totalUnits * chipsPerUnit;
    const fixedChipValue = unitPrice / chipsPerUnit;

    document.getElementById('playerCount').innerText = players.length;
    document.getElementById('totalUnits').innerText = totalUnits;
    document.getElementById('totalPot').innerText = '$' + totalPot.toFixed(2);
    document.getElementById('expectedChips').innerText = expectedChips.toLocaleString();
    document.getElementById('totalChips').innerText = totalChipsCounted.toLocaleString();
    
    let displayChipValue = fixedChipValue < 0.01 && fixedChipValue > 0 ? fixedChipValue.toFixed(4) : fixedChipValue.toFixed(2);
    document.getElementById('chipValue').innerText = '$' + displayChipValue;

    players.forEach(p => {
      const totalIn = p.buyInUnits * unitPrice;
      const payout = p.endingChips * fixedChipValue;
      const pl = payout - totalIn;

      document.getElementById('payout-' + p.id).innerText = '$' + payout.toFixed(2);
      
      const plEl = document.getElementById('pl-' + p.id);
      const plFormatted = (pl >= 0 ? '+$' : '-$') + Math.abs(pl).toFixed(2);
      plEl.innerText = plFormatted;
      plEl.className = pl >= 0 ? 'result-positive' : 'result-negative';

      try {
        const subject = encodeURIComponent(`Poker Game Summary - ${gameDate}`);
        const body = encodeURIComponent(
`Hi ${p.name},

Here is your summary for the poker game on ${gameDate}:

• Buy-in Units: ${p.buyInUnits}
• Total Cash In: $${totalIn.toFixed(2)}
• Ending Chips Count: ${p.endingChips}

------------------------
• Final Payout: $${payout.toFixed(2)}
• Net Profit/Loss: ${plFormatted}
------------------------

Thanks for playing!`
        );
        const mailtoLink = `mailto:${p.email || ''}?subject=${subject}&body=${body}`;
        document.getElementById('email-btn-' + p.id).href = mailtoLink;
      } catch(e) {
        document.getElementById('email-btn-' + p.id).href = '#';
      }
    });

    saveData();
  }

  // Start the application
  loadData();
  renderPlayers();

</script>
</body>
</html>
